<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>БАНК TAP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height: 100%;
      overflow: hidden;
      touch-action: none;
    }
    body {
      background: linear-gradient(135deg, #000814, #001a00);
      color: #f0fff0;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }
    #header {
      padding: 8px 12px;
      display: flex;
      justify-content: space-between;
      font-size: 9px;
      background: rgba(0,20,0,0.9);
      border-bottom: 2px solid #00ff88;
      flex-shrink: 0;
      min-height: 80px;
      z-index: 10;
    }
    .stat-box {
      background: rgba(0,255,136,0.12);
      border: 1.5px solid #00ff88;
      padding: 6px 8px;
      border-radius: 6px;
      min-width: 85px;
      min-height: 32px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      font-size: 8.5px;
      box-shadow: 0 0 8px rgba(0,255,136,0.4);
      font-weight: 700;
    }
    #game-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 12px 0;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }
    #card-wrapper {
      position: relative;
      width: 90%;
      max-width: 360px;
      user-select: none;
      touch-action: none;
      z-index: 2;
    }
    .canvas-stack {
      position: relative;
      width: 100%;
      aspect-ratio: 380 / 460;
    }
    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }
    #frame-canvas { z-index: 1; }
    #content-canvas { z-index: 2; transition: transform 0.13s ease-out; transform-origin: center center; will-change: transform; }
    .level-progress-container {
      width: 90%;
      max-width: 360px;
      padding: 0 10px;
      margin: 4px 0 12px;
      text-align: center;
      font-size: 9px;
      min-height: 36px;
      flex-shrink: 0;
      z-index: 2;
    }
    .level-progress-bar {
      height: 10px;
      background: #0f1a0f;
      border: 2px solid #00ff88;
      margin-top: 3px;
      overflow: hidden;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,255,136,0.5);
    }
    .level-progress-fill {
      height: 100%;
      background: linear-gradient(to right, #00ff88, #39ff14);
      width: 0%;
      transition: width 0.5s ease;
    }
    .menu {
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 2px solid #00ff88;
      background: rgba(0,20,0,0.9);
      flex-shrink: 0;
      min-height: 140px;
      z-index: 10;
    }
    .menu-row { display: flex; justify-content: space-between; gap: 8px; }
    button {
      flex: 1;
      background: #0f1a0f;
      color: #f0fff0;
      border: 2.5px solid #00ff88;
      padding: 12px 8px;
      font-size: 11px;
      cursor: pointer;
      border-radius: 6px;
      min-height: 52px;
      box-shadow: 0 0 12px rgba(0,255,136,0.5);
      transition: all 0.2s;
      font-weight: 700;
    }
    button:active { transform: scale(0.95); box-shadow: 0 0 18px #00ff88; }
    button:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,15,0,0.96);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 15px;
    }
    .modal-inner {
      width: 100%;
      max-width: 360px;
      max-height: 88vh;
      background: #0a0f0a;
      border: 3px solid #00ff88;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(0,255,136,0.6);
    }
    .modal-header {
      padding: 12px;
      background: rgba(0,255,136,0.15);
      border-bottom: 2px solid #00ff88;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
    }
    .modal-body { padding: 16px; overflow-y: auto; flex: 1; }
    .modal-footer {
      padding: 12px;
      border-top: 2px solid #00ff88;
      background: rgba(0,15,0,0.8);
    }
    .float-text {
      position: absolute;
      color: #ffd700;
      font-size: 20px;
      pointer-events: none;
      animation: floatUp 1.2s forwards;
      text-shadow: 0 0 10px #ffd700;
      z-index: 10;
    }
    #achievement-toast {
      position: fixed;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,15,0,0.95);
      border: 3px solid #00ff88;
      color: #f0fff0;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      z-index: 3000;
      box-shadow: 0 0 20px #00ff88;
      min-width: 220px;
      display: none;
    }
    @keyframes floatUp { to { transform: translateY(-80px) scale(1.2); opacity: 0; } }
    #level-up-notification {
      position: fixed;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 136, 0.92);
      color: #000;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 0 20px #00ff88;
      z-index: 5000;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
      text-align: center;
      min-width: 240px;
      border: 2px solid #000;
    }
    #level-up-notification.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <div id="sound-pool" style="display:none;">
    <audio preload="auto" class="tap-sound"><source src="audio/tap.mp3" type="audio/mpeg"></audio>
    <audio preload="auto" class="tap-sound"><source src="audio/tap.mp3" type="audio/mpeg"></audio>
    <audio preload="auto" class="tap-sound"><source src="audio/tap.mp3" type="audio/mpeg"></audio>
    <audio preload="auto" class="tap-sound"><source src="audio/tap.mp3" type="audio/mpeg"></audio>
    <audio preload="auto" class="tap-sound"><source src="audio/tap.mp3" type="audio/mpeg"></audio>
    <audio preload="auto" class="tap-sound"><source src="audio/tap.mp3" type="audio/mpeg"></audio>
    <audio preload="auto" class="tap-sound"><source src="audio/tap.mp3" type="audio/mpeg"></audio>
    <audio preload="auto" class="tap-sound"><source src="audio/tap.mp3" type="audio/mpeg"></audio>
  </div>
  <audio id="sound-achivka" preload="auto"><source src="audio/achivka.mp3" type="audio/mpeg"></audio>
  <audio id="sound-level" preload="auto"><source src="audio/level.mp3" type="audio/mpeg"></audio>

  <div id="header">
    <div class="stat-left">
      <div class="stat-box">LVL <span id="level">1</span>/15</div>
      <div class="stat-box">₽ <span id="coins">0</span></div>
      <div class="stat-box">ТАП <span id="perTap">+1 ₽</span></div>
      <div class="stat-box"><span id="profit">0</span> ₽/ч</div>
    </div>
    <div class="stat-right">
      <div class="stat-box">ЭНЕРГИЯ: <span id="energy">800</span>/<span id="maxEnergy">800</span></div>
      <div class="stat-box">ВОССТ: <span id="energySpeed">3.0</span> сек</div>
      <div class="stat-box">ДРОП: <span id="dropCards">0</span>/5</div>
    </div>
  </div>

  <div id="game-area">
    <div id="card-wrapper">
      <div class="canvas-stack">
        <canvas id="frame-canvas" width="380" height="460"></canvas>
        <canvas id="content-canvas" width="380" height="460"></canvas>
      </div>
    </div>
    <div class="level-progress-container">
      ДО СЛЕД. УРОВНЯ: <span id="clicksCurrent">0</span> / <span id="clicksNeeded">—</span>
      <div class="level-progress-bar"><div id="levelProgressFill" class="level-progress-fill"></div></div>
    </div>
  </div>

  <div class="menu">
    <div class="menu-row">
      <button onclick="showMenu('shop')">МАГАЗИН</button>
      <button onclick="showMenu('market')">ЧЁРНЫЙ РЫНОК</button>
      <button onclick="showMenu('cards')">КАРТОЧКИ</button>
    </div>
    <div class="menu-row">
      <button onclick="showMenu('daily')">БОНУС</button>
      <button onclick="showMenu('refs')">ТИМЛИД</button>
      <button onclick="showMenu('tasks')">ЗАДАНИЯ</button>
    </div>
    <div class="menu-row">
      <button onclick="showAchievements()">ДОСТИЖЕНИЯ 🏆</button>
    </div>
  </div>

  <div id="modal" class="modal">
    <div class="modal-inner">
      <div class="modal-header" id="modalHeader"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <div id="achievement-toast"></div>
  <div id="level-up-notification"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();
    tg.enableClosingConfirmation();

    let player = {
      coins: 0,
      energy: 800,
      maxEnergy: 800,
      energyRecoverTime: 3.0,
      level: 1,
      accumulatedClicks: 0,
      dropCards: 0,
      manualLevel: 0,
      energyMaxLevel: 0,
      energySpeedLevel: 0,
      autoTapLevel: 0,
      dropChanceLevel: 0,
      p2pLevel: 0,
      streak: 1,
      lastBonusClaimTime: 0,
      referrals: 0,
      referralIncome: 0,
      referralCode: null,
      referralActivated: false,
      totalTaps: 0,
      totalCoinsEarned: 0,
      achievementPassiveBonus: 0,
      unlockedAchievements: []
    };

    let lastTapTime = 0;
    let lastEnergyTime = Date.now();
    let autoTapInterval = null;
    let passiveInterval = null;

    const frameCanvas = document.getElementById('frame-canvas');
    const frameCtx = frameCanvas.getContext('2d');
    const contentCanvas = document.getElementById('content-canvas');
    const contentCtx = contentCanvas.getContext('2d');
    const wrapper = document.getElementById('card-wrapper');

    const banks = [
      {name: "Озн Банк", color: "#003087"},{name: "Р-Банк", color: "#FFDD2D"},{name: "Сквбанк", color: "#003087"},
      {name: "Алфбанк", color: "#EF3124"},{name: "ВБТ", color: "#0033A0"},{name: "Гзпбанк", color: "#003087"},
      {name: "Рсхзбанк", color: "#009246"},{name: "МКБ", color: "#FF0000"},{name: "ПСБ", color: "#800080"},
      {name: "Рйфбанк", color: "#FFDD2D"},{name: "Рсбанк", color: "#003087"},{name: "Откбанк", color: "#FF6600"},
      {name: "Пчтбанк", color: "#003087"},{name: "Рсстндрт", color: "#808080"},{name: "Сбрбанк", color: "#009246"}
    ];

    const shopItems = [
      { id: 'manual', name: 'Мануал', maxLvl:10, basePrice:300, priceMult:1.72, effect: lvl => Math.floor(1 + lvl * 1.15), desc: 'Доход за тап' },
      { id: 'energyMax', name: 'Макс. энергия', maxLvl:8, basePrice:450, priceMult:1.85, effect: lvl => 800 + lvl * 50, desc: '+50 макс. энергии' },
      { id: 'energySpeed', name: 'Ускорение энергии', maxLvl:10, basePrice:600, priceMult:1.95, effect: lvl => Math.max(0.4, 3 - lvl * 0.26).toFixed(1), desc: 'Восстановление быстрее' },
      { id: 'autoTap', name: 'Авто-таппер', maxLvl:6, basePrice:1200, priceMult:2.4, effect: lvl => lvl, desc: 'Тапы каждые 5 сек' },
      { id: 'dropChance', name: 'Множитель дропа', maxLvl:7, basePrice:1800, priceMult:2.1, effect: lvl => (1 + lvl * 0.15).toFixed(2), desc: '+15% шанс карточки' },
      { id: 'p2p', name: 'Премиум-карта P2P', maxLvl:12, basePrice:2500, priceMult:1.68, effect: lvl => (lvl * 0.8).toFixed(1), desc: 'Пассивный доход ₽/ч' }
    ];

    const achievements = [
      { id: 'taps_100', name: 'Новичок', desc: 'Сделай 100 тапов', type: 'taps', value: 100, reward: 3 },
      { id: 'taps_1000', name: 'Активный тапер', desc: 'Сделай 1 000 тапов', type: 'taps', value: 1000, reward: 5 },
      { id: 'taps_10000', name: 'Профессионал', desc: 'Сделай 10 000 тапов', type: 'taps', value: 10000, reward: 10 },
      { id: 'taps_50000', name: 'Мастер тапа', desc: 'Сделай 50 000 тапов', type: 'taps', value: 50000, reward: 15 },
      { id: 'taps_200000', name: 'Легенда тапа', desc: 'Сделай 200 000 тапов', type: 'taps', value: 200000, reward: 25 },
      { id: 'level_5', name: 'Менеджер банка', desc: 'Достигни 5 уровня', type: 'level', value: 5, reward: 8 },
      { id: 'level_10', name: 'Вице-президент', desc: 'Достигни 10 уровня', type: 'level', value: 10, reward: 15 },
      { id: 'level_15', name: 'Генеральный директор', desc: 'Достигни 15 уровня', type: 'level', value: 15, reward: 30 },
      { id: 'coins_50000', name: 'Богатый клиент', desc: 'Заработай 50 000 ₽ всего', type: 'coins', value: 50000, reward: 10 },
      { id: 'coins_500000', name: 'Миллионер', desc: 'Заработай 500 000 ₽ всего', type: 'coins', value: 500000, reward: 20 },
      { id: 'coins_5000000',name: 'Олигарх', desc: 'Заработай 5 000 000 ₽ всего',type: 'coins', value: 5000000,reward: 35 }
    ];

    // ====================== ИСПРАВЛЕННЫЕ И ДОБАВЛЕННЫЕ ФУНКЦИИ ======================
    function recalculateStats() {
      player.maxEnergy = 800 + player.energyMaxLevel * 50;
      player.energy = Math.min(player.energy, player.maxEnergy);
      player.energyRecoverTime = Math.max(0.4, 3.0 - player.energySpeedLevel * 0.26);
    }

    function getClicksNeeded(lvl) {
      return Math.floor(25 + lvl * 35 * Math.pow(1.35, lvl - 1));
    }

    function updateLevelProgress() {
      const needed = getClicksNeeded(player.level);
      document.getElementById('clicksCurrent').textContent = player.accumulatedClicks;
      document.getElementById('clicksNeeded').textContent = needed;
      const perc = Math.min(100, Math.floor((player.accumulatedClicks / needed) * 100));
      document.getElementById('levelProgressFill').style.width = `${perc}%`;
    }

    function updateUI() {
      recalculateStats();
      document.getElementById('level').textContent = player.level;
      document.getElementById('coins').textContent = Math.floor(player.coins).toLocaleString('ru-RU');
      const perTapEarn = Math.floor(1 + player.manualLevel * 1.15);
      document.getElementById('perTap').textContent = `+${perTapEarn} ₽`;
      const hourlyProfit = player.p2pLevel * 0.8;
      document.getElementById('profit').textContent = Math.floor(hourlyProfit);
      document.getElementById('energy').textContent = Math.floor(player.energy);
      document.getElementById('maxEnergy').textContent = player.maxEnergy;
      document.getElementById('energySpeed').textContent = player.energyRecoverTime.toFixed(1);
      document.getElementById('dropCards').textContent = `${player.dropCards}/5`;
      updateLevelProgress();
    }

    function drawFrame() {
      frameCtx.clearRect(0, 0, 380, 460);
      frameCtx.strokeStyle = "#00ff9d"; frameCtx.lineWidth = 6; frameCtx.lineJoin = 'round';
      frameCtx.strokeRect(20, 50, 340, 360);
      frameCtx.fillStyle = "#ffffff"; frameCtx.font = "bold 16px 'Press Start 2P'";
      frameCtx.textAlign = "center"; frameCtx.fillText(`LVL ${player.level}`, 190, 85);
    }

    function drawContent() {
      contentCtx.clearRect(0, 0, 380, 460);
      const bank = banks[player.level - 1] || {name: "BANK TAP", color: "#00ff9d"};
      contentCtx.shadowBlur = 15; contentCtx.shadowColor = bank.color;
      contentCtx.fillStyle = bank.color; contentCtx.fillRect(50, 130, 280, 160);
      contentCtx.shadowBlur = 0;
      contentCtx.fillStyle = "rgba(255,255,255,0.3)"; contentCtx.fillRect(58, 138, 264, 35);
      contentCtx.fillStyle = "#ffd700"; contentCtx.fillRect(75, 160, 65, 45);
      contentCtx.fillStyle = "#ffffff"; contentCtx.font = "bold 22px 'Press Start 2P'";
      contentCtx.textAlign = "center"; contentCtx.shadowBlur = 10; contentCtx.shadowColor = "#000000";
      contentCtx.fillText(bank.name, 190, 215);
      contentCtx.shadowBlur = 0; contentCtx.font = "14px monospace"; contentCtx.fillStyle = "#ffffff";
      contentCtx.fillText("•••• •••• •••• " + (1000 + player.level*111), 190, 250);
      contentCtx.fillStyle = "#00ff9d"; contentCtx.font = "bold 12px 'Press Start 2P'";
      contentCtx.fillText("МИР", 260, 280);
    }

    function redraw() { drawFrame(); drawContent(); }

    function createFloatingText(text, x, y, color = '#ffd700') {
      const el = document.createElement('div');
      el.className = 'float-text';
      el.textContent = text;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;
      el.style.color = color;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }

    function showTopNotification(message, type = 'level') {
      const notif = document.getElementById('level-up-notification');
      notif.textContent = message;
      if (type === 'level') {
        notif.style.background = 'rgba(0, 255, 157, 0.92)';
        notif.style.color = '#000';
      } else {
        notif.style.background = 'rgba(255, 215, 0, 0.92)';
        notif.style.color = '#000';
      }
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 4000);
    }

    function checkLevelUp() {
      if (player.level >= 15) return;
      const needed = getClicksNeeded(player.level);
      if (player.accumulatedClicks >= needed) {
        player.level++;
        player.accumulatedClicks = 0;
        redraw();
        playSound('level');
        showTopNotification(`ПОВЫШЕНИЕ! LVL ${player.level}`, 'level');
        player.coins += 500 * player.level;
        checkAllAchievements();
        updateUI();
        saveGame();
      }
    }

    function checkAllAchievements() {
      achievements.forEach(ach => {
        if (player.unlockedAchievements.includes(ach.id)) return;
        let unlocked = false;
        if (ach.type === 'taps' && player.totalTaps >= ach.value) unlocked = true;
        else if (ach.type === 'level' && player.level >= ach.value) unlocked = true;
        else if (ach.type === 'coins' && player.totalCoinsEarned >= ach.value) unlocked = true;

        if (unlocked) {
          player.unlockedAchievements.push(ach.id);
          player.coins += ach.reward;
          playSound('achivka');
          const toast = document.getElementById('achievement-toast');
          toast.textContent = `🏆 ${ach.name} +${ach.reward} ₽`;
          toast.style.display = 'block';
          setTimeout(() => toast.style.display = 'none', 4000);
          updateUI();
          saveGame();
        }
      });
    }

    function tap(e) {
      e.preventDefault(); e.stopPropagation();
      if (player.energy <= 0) return;

      const now = Date.now();
      if (now - lastTapTime < 30) return;
      lastTapTime = now;

      playTapSound();

      player.energy = Math.max(0, player.energy - 1);
      const earn = Math.floor(1 + player.manualLevel * 1.15);
      player.coins += earn;
      player.accumulatedClicks++;
      player.totalTaps++;
      player.totalCoinsEarned += earn;

      contentCanvas.style.transform = 'scale(1.06) translateY(-6px)';
      setTimeout(() => contentCanvas.style.transform = 'scale(1) translateY(0)', 110);

      const rect = wrapper.getBoundingClientRect();
      let cx = e.clientX ?? (e.touches?.[0]?.clientX ?? rect.left + rect.width/2);
      let cy = e.clientY ?? (e.touches?.[0]?.clientY ?? rect.top + rect.height/2);
      const ox = cx - rect.left + Math.random()*40 - 20;
      const oy = cy - rect.top - 30;

      createFloatingText(`+${earn}`, rect.left + ox, rect.top + oy);

      // ДРОП КАРТОЧКИ
      const dropMult = 1 + player.dropChanceLevel * 0.15;
      if (Math.random() < 0.045 * dropMult && player.dropCards < 5) {
        player.dropCards++;
        createFloatingText('🃏 ДРОП!', rect.left + ox + 35, rect.top + oy - 55, '#00ffcc');
      }

      checkLevelUp();
      checkAllAchievements();
      updateUI();
      saveGame();
    }

    // ====================== МАГАЗИН ======================
    function buyItem(id) {
      const item = shopItems.find(i => i.id === id);
      if (!item) return;
      const currLvl = player[`${id}Level`] || 0;
      if (currLvl >= item.maxLvl) {
        tg.showAlert('Макс. уровень!');
        return;
      }
      const price = Math.floor(item.basePrice * Math.pow(item.priceMult, currLvl));
      if (player.coins < price) {
        tg.showAlert('Недостаточно ₽!');
        return;
      }
      player.coins -= price;
      player[`${id}Level`] = currLvl + 1;
      recalculateStats();
      if (id === 'autoTap') startAutoTap();
      updateUI();
      saveGame();
      tg.showAlert(`+1 ${item.name}`);
      // обновляем магазин если открыт
      if (document.getElementById('modal').style.display === 'flex') showMenu('shop');
    }

    function showShopContent() {
      let html = '<div style="display:grid;gap:12px;font-size:10px;">';
      shopItems.forEach(item => {
        const currLvl = player[`${item.id}Level`] || 0;
        const price = Math.floor(item.basePrice * Math.pow(item.priceMult, currLvl));
        const currEff = item.effect(currLvl);
        const nextEff = item.effect(currLvl + 1);
        html += `
          <div style="background:rgba(0,255,136,0.1);border:2px solid #00ff88;padding:12px;border-radius:8px;">
            <div><b>${item.name}</b> (lvl ${currLvl}/${item.maxLvl})</div>
            <div style="color:#aaffaa;font-size:9px;">${item.desc}</div>
            <div style="margin:8px 0 6px;">${currEff} → ${nextEff}</div>
            <button onclick="buyItem('${item.id}')" style="width:100%;padding:10px;font-size:11px;">${price} ₽</button>
          </div>`;
      });
      html += '</div>';
      document.getElementById('modalBody').innerHTML = html;
    }

    // ====================== ОСТАЛЬНЫЕ МЕНЮ ======================
    function showMenu(type) {
      const modal = document.getElementById('modal');
      modal.style.display = 'flex';
      const header = document.getElementById('modalHeader');
      const body = document.getElementById('modalBody');
      const footer = document.getElementById('modalFooter');

      header.textContent = {
        shop: 'МАГАЗИН УЛУЧШЕНИЙ',
        market: 'ЧЁРНЫЙ РЫНОК',
        cards: 'КАРТОЧКИ',
        daily: 'ЕЖЕДНЕВНЫЙ БОНУС',
        refs: 'ТИМЛИД',
        tasks: 'ЗАДАНИЯ'
      }[type] || 'МЕНЮ';

      body.innerHTML = '';
      footer.innerHTML = '<button onclick="closeModal()" style="width:100%;">ЗАКРЫТЬ</button>';

      if (type === 'shop') showShopContent();
      else if (type === 'market') body.innerHTML = '<p style="text-align:center;color:#ffaa00;padding:40px 20px;">Чёрный рынок скоро!<br>Эксклюзивные предметы уже в пути 🔥</p>';
      else if (type === 'cards') body.innerHTML = `<p style="text-align:center;padding:30px;">Дропнуто: <b>${player.dropCards}/5</b><br><br>Коллекция банков скоро появится!</p>`;
      else if (type === 'daily') {
        const now = Date.now();
        const hours = (now - (player.lastBonusClaimTime || 0)) / 3600000;
        const canClaim = hours >= 24;
        const bonus = 200 + player.streak * 150;
        let html = `<p style="text-align:center;">Стрик: <b>${player.streak}</b> дней</p>`;
        html += `<p style="text-align:center;font-size:18px;margin:20px 0;">Бонус: <b>${bonus} ₽</b></p>`;
        if (canClaim) html += `<button onclick="claimDailyBonus()" style="width:100%;padding:14px;">ЗАБРАТЬ!</button>`;
        else html += `<p style="text-align:center;color:#ffdd88;">Ещё ${Math.ceil(24 - hours)} ч</p>`;
        body.innerHTML = html;
      }
      else if (type === 'refs') {
        body.innerHTML = `
          <p>Твой код: <b>${player.referralCode || '—'}</b></p>
          <p>Рефералов: <b>${player.referrals}</b></p>
          <p>Доход от рефов: <b>${player.referralIncome} ₽</b></p>
          <p style="font-size:9px;margin-top:20px;">Поделись: t.me/BankTapBot?start=${player.referralCode || ''}</p>
        `;
      }
      else if (type === 'tasks') {
        body.innerHTML = '<p style="text-align:center;padding:40px 20px;color:#aaffaa;">Ежедневные задания скоро!<br>Следи за обновлениями 🔥</p>';
      }
    }

    function claimDailyBonus() {
      const bonus = 200 + player.streak * 150;
      player.coins += bonus;
      player.lastBonusClaimTime = Date.now();
      player.streak++;
      updateUI();
      saveGame();
      closeModal();
      tg.showAlert(`+${bonus} ₽! Стрик теперь ${player.streak}`);
      playSound('achivka');
    }

    function showAchievements() {
      let html = '<div style="display:flex;flex-direction:column;gap:10px;">';
      achievements.forEach(ach => {
        const done = player.unlockedAchievements.includes(ach.id);
        html += `
          <div style="background:${done?'rgba(0,255,136,0.25)':'rgba(255,255,255,0.05)'};border:2px solid ${done?'#00ff88':'#444'};padding:12px;border-radius:8px;">
            <b>${ach.name}</b> ${done?'✅':''}<br>
            <small>${ach.desc}</small><br>
            <span style="color:#ffd700">+${ach.reward} ₽</span>
          </div>`;
      });
      html += '</div>';
      document.getElementById('modalBody').innerHTML = html;
      document.getElementById('modalHeader').textContent = 'ДОСТИЖЕНИЯ';
      document.getElementById('modal').style.display = 'flex';
      document.getElementById('modalFooter').innerHTML = '<button onclick="closeModal()" style="width:100%;">ЗАКРЫТЬ</button>';
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function saveGame() {
      localStorage.setItem('bankTapPlayer', JSON.stringify(player));
    }

    function loadGame() {
      const saved = localStorage.getItem('bankTapPlayer');
      if (saved) {
        Object.assign(player, JSON.parse(saved));
      }
      player.coins = Number(player.coins) || 0;
      player.energy = Number(player.energy) || 800;
      player.totalTaps = Number(player.totalTaps) || 0;
      player.totalCoinsEarned = Number(player.totalCoinsEarned) || 0;
    }

    function startAutoTap() {
      if (autoTapInterval) clearInterval(autoTapInterval);
      if (player.autoTapLevel <= 0) return;
      autoTapInterval = setInterval(() => {
        if (player.energy > 0) {
          const earn = Math.floor(1 + player.manualLevel * 1.15);
          const taps = player.autoTapLevel;
          player.coins += earn * taps;
          player.totalTaps += taps;
          player.totalCoinsEarned += earn * taps;
          player.energy = Math.max(0, player.energy - taps);
          checkLevelUp();
          checkAllAchievements();
          updateUI();
          saveGame();
        }
      }, 5000);
    }

    function startPassiveIncome() {
      if (passiveInterval) clearInterval(passiveInterval);
      passiveInterval = setInterval(() => {
        const hourly = player.p2pLevel * 0.8;
        if (hourly > 0) {
          player.coins += hourly / 3600;
          updateUI();
        }
      }, 1000);
    }

    // ====================== ЗВУКИ ======================
    const tapSounds = Array.from(document.querySelectorAll('.tap-sound'));
    let tapSoundIndex = 0;
    function playTapSound() {
      const sound = tapSounds[tapSoundIndex];
      sound.currentTime = 0;
      sound.volume = 0.4;
      sound.play().catch(() => {});
      tapSoundIndex = (tapSoundIndex + 1) % tapSounds.length;
    }

    const sounds = {
      achivka: document.getElementById('sound-achivka'),
      level: document.getElementById('sound-level')
    };
    function playSound(type) {
      const sound = sounds[type];
      if (!sound) return;
      sound.currentTime = 0;
      sound.volume = type === 'achivka' ? 0.7 : 0.85;
      sound.play().catch(() => {});
    }

    // ====================== ЗАПУСК ======================
    window.addEventListener('load', () => {
      loadGame();
      recalculateStats();
      redraw();
      updateUI();
      startAutoTap();
      startPassiveIncome();
      checkAllAchievements();

      // реферальная ссылка
      if (!player.referralCode && tg.initDataUnsafe?.user?.id) {
        player.referralCode = tg.initDataUnsafe.user.id.toString();
        saveGame();
      }
      const urlParams = new URLSearchParams(window.location.search);
      const refFrom = urlParams.get('start');
      if (refFrom && refFrom !== player.referralCode && !player.referralActivated) {
        player.coins += 1000;
        player.referralActivated = true;
        tg.showAlert('Пришёл по рефке! +1000 ₽');
        saveGame();
        updateUI();
      }

      // адаптация экрана
      function adjustLayout() {
        tg.expand();
      }
      window.addEventListener('resize', adjustLayout);
      window.addEventListener('orientationchange', adjustLayout);
      setTimeout(adjustLayout, 100);

      // энергия восстанавливается
      setInterval(() => {
        const now = Date.now();
        if (now - lastEnergyTime >= player.energyRecoverTime * 1000 && player.energy < player.maxEnergy) {
          player.energy++;
          lastEnergyTime = now;
          updateUI();
          saveGame();
        }
      }, 500);

      // тап
      wrapper.addEventListener('pointerdown', tap, { passive: false });
      wrapper.addEventListener('touchstart', tap, { passive: false });

      // начальные отрисовки
      setTimeout(() => { redraw(); updateUI(); }, 150);
    });
  </script>
</body>
</html>
