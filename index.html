<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>БАНК TAP</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: linear-gradient(135deg, #000814, #001a00);
      color:#f0fff0;
      font-family:'Press Start 2P', monospace;
      font-size:10px;
      overflow:hidden;
      height:100vh;
      display:flex;
      flex-direction:column;
      touch-action:none;
    }
    #header {
      padding:8px 12px;
      display:flex;
      justify-content:space-between;
      font-size:9px;
      background:rgba(0,20,0,0.9);
      border-bottom:2px solid #00ff88;
      flex-shrink:0;
      min-height:80px;
      z-index:10;
    }
    .stat-box {
      background:rgba(0,255,136,0.12);
      border:1.5px solid #00ff88;
      padding:6px 8px;
      border-radius:6px;
      min-width:85px;
      min-height:32px;
      text-align:center;
      display:flex;
      align-items:center;
      justify-content:center;
      white-space:nowrap;
      font-size:8.5px;
      box-shadow:0 0 8px rgba(0,255,136,0.4);
      font-weight:700;
    }
    #game-area {
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      padding-top:12px;
      overflow:hidden;
      position:relative;
      z-index:1;
    }
    #card-wrapper {
      position:relative;
      width:90%;
      max-width:360px;
      user-select:none;
      touch-action:none;
      z-index:2;
    }
    .canvas-stack {
      position:relative;
      width:100%;
      aspect-ratio:380 / 460;
    }
    canvas {
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      pointer-events:none;
    }
    #frame-canvas { z-index:1; }
    #content-canvas { z-index:2; transition: transform 0.13s ease-out; transform-origin:center center; will-change:transform; }
    .level-progress-container {
      width:90%;
      max-width:360px;
      padding:0 10px;
      margin:4px 0 12px;
      text-align:center;
      font-size:9px;
      min-height:36px;
      flex-shrink:0;
      z-index:2;
    }
    .level-progress-bar {
      height:10px;
      background:#0f1a0f;
      border:2px solid #00ff88;
      margin-top:3px;
      overflow:hidden;
      border-radius:6px;
      box-shadow:0 0 10px rgba(0,255,136,0.5);
    }
    .level-progress-fill {
      height:100%;
      background:linear-gradient(to right, #00ff88, #39ff14);
      width:0%;
      transition:width 0.5s ease;
    }
    .menu {
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:8px;
      border-top:2px solid #00ff88;
      background:rgba(0,20,0,0.9);
      flex-shrink:0;
      min-height:140px;
      z-index:10;
    }
    .menu-row { display:flex; justify-content:space-between; gap:8px; }
    button {
      flex:1;
      background:#0f1a0f;
      color:#f0fff0;
      border:2.5px solid #00ff88;
      padding:12px 8px;
      font-size:11px;
      cursor:pointer;
      border-radius:6px;
      min-height:52px;
      box-shadow:0 0 12px rgba(0,255,136,0.5);
      transition:all 0.2s;
      font-weight:700;
    }
    button:active { transform:scale(0.95); box-shadow:0 0 18px #00ff88; }
    button:disabled { opacity:0.5; cursor:not-allowed; box-shadow:none; }
    .modal {
      position:fixed;
      inset:0;
      background:rgba(0,15,0,0.96);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:1000;
      padding:15px;
    }
    .modal-inner {
      width:100%;
      max-width:360px;
      max-height:88vh;
      background:#0a0f0a;
      border:3px solid #00ff88;
      border-radius:10px;
      overflow:hidden;
      display:flex;
      flex-direction:column;
      box-shadow:0 0 30px rgba(0,255,136,0.6);
    }
    .modal-header {
      padding:12px;
      background:rgba(0,255,136,0.15);
      border-bottom:2px solid #00ff88;
      text-align:center;
      font-size:15px;
      font-weight:700;
    }
    .modal-body { padding:16px; overflow-y:auto; flex:1; }
    .modal-footer {
      padding:12px;
      border-top:2px solid #00ff88;
      background:rgba(0,15,0,0.8);
    }
    .float-text {
      position:absolute;
      color:#ffd700;
      font-size:20px;
      pointer-events:none;
      animation:floatUp 1.2s forwards;
      text-shadow:0 0 10px #ffd700;
      z-index:10;
    }
    #achievement-toast {
      position:fixed;
      bottom:140px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,15,0,0.95);
      border:3px solid #00ff88;
      color:#f0fff0;
      padding:12px 20px;
      border-radius:8px;
      font-size:13px;
      text-align:center;
      z-index:3000;
      box-shadow:0 0 20px #00ff88;
      min-width:220px;
      display:none;
    }
    @keyframes floatUp { to { transform:translateY(-80px) scale(1.2); opacity:0; } }
    #level-up-notification {
      position: fixed;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 255, 136, 0.92);
      color: #000;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 0 20px #00ff88;
      z-index: 5000;
      opacity: 0;
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
      text-align: center;
      min-width: 240px;
      border: 2px solid #000;
    }
    #level-up-notification.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>
  <!-- Звуки -->
  <audio id="sound-tap" preload="auto"><source src="audio/tap.mp3" type="audio/mpeg"></audio>
  <audio id="sound-achivka" preload="auto"><source src="audio/achivka.mp3" type="audio/mpeg"></audio>
  <audio id="sound-level" preload="auto"><source src="audio/level.mp3" type="audio/mpeg"></audio>
  <audio id="sound-interface" preload="auto"><source src="audio/interface.mp3" type="audio/mpeg"></audio>
  <div id="header">
    <div class="stat-left">
      <div class="stat-box">LVL <span id="level">1</span>/15</div>
      <div class="stat-box">₽ <span id="coins">0</span></div>
      <div class="stat-box">ТАП <span id="perTap">+1 ₽</span></div>
      <div class="stat-box"><span id="profit">0</span> ₽/ч</div>
    </div>
    <div class="stat-right">
      <div class="stat-box">ЭНЕРГИЯ: <span id="energy">800</span>/<span id="maxEnergy">800</span></div>
      <div class="stat-box">ВОССТ: <span id="energySpeed">3.0</span> сек</div>
      <div class="stat-box">ДРОП: <span id="dropCards">0</span>/5</div>
    </div>
  </div>
  <div id="game-area">
    <div id="card-wrapper">
      <div class="canvas-stack">
        <canvas id="frame-canvas" width="380" height="460"></canvas>
        <canvas id="content-canvas" width="380" height="460"></canvas>
      </div>
    </div>
    <div class="level-progress-container">
      ДО СЛЕД. УРОВНЯ: <span id="clicksCurrent">0</span> / <span id="clicksNeeded">—</span>
      <div class="level-progress-bar"><div id="levelProgressFill" class="level-progress-fill"></div></div>
    </div>
  </div>
  <div class="menu">
    <div class="menu-row">
      <button onclick="showMenu('shop')">МАГАЗИН</button>
      <button onclick="showMenu('market')">ЧЁРНЫЙ РЫНОК</button>
      <button onclick="showMenu('cards')">КАРТОЧКИ</button>
    </div>
    <div class="menu-row">
      <button onclick="showMenu('daily')">БОНУС</button>
      <button onclick="showMenu('refs')">ТИМЛИД</button>
      <button onclick="showMenu('tasks')">ЗАДАНИЯ</button>
    </div>
    <div class="menu-row">
      <button onclick="showAchievements()">ДОСТИЖЕНИЯ 🏆</button>
    </div>
  </div>
  <div id="modal" class="modal">
    <div class="modal-inner">
      <div class="modal-header" id="modalHeader"></div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>
  <div id="achievement-toast"></div>
  <div id="level-up-notification"></div>
  <script>
    const tg = window.Telegram?.WebApp || { ready:()=>{}, expand:()=>{}, showAlert:alert, openLink:(url)=>window.open(url,'_blank') };
    tg.ready();
    tg.expand();
    let userInteracted = false;
    const sounds = {
      tap: document.getElementById('sound-tap'),
      achivka: document.getElementById('sound-achivka'),
      level: document.getElementById('sound-level'),
      interface: document.getElementById('sound-interface')
    };
    function playSound(type) {
      const sound = sounds[type];
      if (!sound) return;
      if (!userInteracted) userInteracted = true;
      sound.currentTime = 0;
      if (type === 'tap') sound.volume = 0.4;
      if (type === 'achivka') sound.volume = 0.7;
      if (type === 'level') sound.volume = 0.85;
      if (type === 'interface') sound.volume = 0.55;
      sound.play().catch(() => {});
    }
    let player = {
      coins: 0,
      energy: 800,
      maxEnergy: 800,
      energyRecoverTime: 3.0,
      level: 1,
      accumulatedClicks: 0,
      dropCards: 0,
      manualLevel: 0,
      energyMaxLevel: 0,
      energySpeedLevel: 0,
      autoTapPurchased: false,
      p2pLevel: 0,
      streak: 1,
      lastBonusClaimed: null,
      referrals: 0,
      referralIncome: 0,
      referralCode: null,
      referralActivated: false,
      totalTaps: 0,
      totalCoinsEarned: 0,
      hourlyProfit: 0,
      achievementPassiveBonus: 0,
      blackMarketPassive: 0,
      lastSaveTime: Date.now(),
      subscriptionBonusPending: false,
      unlockedAchievements: []
    };
    let lastTapTime = 0;
    let lastEnergyTime = Date.now();
    const frameCanvas = document.getElementById('frame-canvas');
    const frameCtx = frameCanvas.getContext('2d');
    const contentCanvas = document.getElementById('content-canvas');
    const contentCtx = contentCanvas.getContext('2d');
    const wrapper = document.getElementById('card-wrapper');
    const banks = [
      {name: "Озн Банк", color: "#003087"},{name: "Р-Банк", color: "#FFDD2D"},{name: "Сквбанк", color: "#003087"},
      {name: "Алфбанк", color: "#EF3124"},{name: "ВБТ", color: "#0033A0"},{name: "Гзпбанк", color: "#003087"},
      {name: "Рсхзбанк", color: "#009246"},{name: "МКБ", color: "#FF0000"},{name: "ПСБ", color: "#800080"},
      {name: "Рйфбанк", color: "#FFDD2D"},{name: "Рсбанк", color: "#003087"},{name: "Откбанк", color: "#FF6600"},
      {name: "Пчтбанк", color: "#003087"},{name: "Рсстндрт", color: "#808080"},{name: "Сбрбанк", color: "#009246"}
    ];
    const shopItems = [
      { id: 'manual', name: 'Увеличивает доход за тап', maxLvl:10, basePrice:300, priceMult:1.72, effect: lvl => Math.floor(1 + lvl * 1.15), desc: 'Доход за 1 тап' },
      { id: 'energyMax', name: 'Увеличивает максимальный запас энергии на 50', maxLvl:8, basePrice:450, priceMult:1.85, effect: lvl => 800 + lvl * 50, desc: 'Макс. энергии' },
      { id: 'energySpeed', name: 'Сокращает время восстановления 1 энергии', maxLvl:10, basePrice:600, priceMult:1.95, effect: lvl => Math.max(0.4, 3 - lvl * 0.26).toFixed(1), desc: 'Время на 1 ед. энергии' },
      { id: 'autoTap', name: 'Авто-таппер', maxLvl:1, basePrice:5000, priceMult:1, effect: lvl => lvl ? 'Активен' : '—', desc: 'Авто-тапы каждые 5 сек (даже оффлайн)' },
      { id: 'p2p', name: 'Премиум-карта P2P', maxLvl:12, basePrice:2500, priceMult:1.68, effect: lvl => (lvl * 0.8).toFixed(1), desc: 'Пассивный доход в ₽/час' }
    ];
    const blackMarketItems = [
      { id: 'usdt_pack', name: "USDT пачка", basePrice: 48000, priceMult: 2.3, maxLvl: 5, passivePerLevel: 55, desc: "Стабильные USDT" },
      { id: 'btc_miner', name: "BTC майнер", basePrice:135000, priceMult: 2.45, maxLvl: 5, passivePerLevel:145, desc: "Майнинг-бонус" },
      { id: 'eth_node', name: "ETH нода", basePrice: 98000, priceMult: 2.35, maxLvl: 5, passivePerLevel:105, desc: "Стейкинг ETH" },
      { id: 'ton_voucher', name: "TON ваучер", basePrice: 62000, priceMult: 2.2, maxLvl: 5, passivePerLevel: 75, desc: "TON-купоны" },
      { id: 'meme_bag', name: "MEME мешок", basePrice: 32000, priceMult: 2.6, maxLvl: 5, passivePerLevel: 40, desc: "Мем-коины" }
    ];
    const achievements = [
      { id: 'taps_100', name: 'Новичок', desc: 'Сделай 100 тапов', type: 'taps', value: 100, reward: 3 },
      { id: 'taps_1000', name: 'Активный тапер', desc: 'Сделай 1 000 тапов', type: 'taps', value: 1000, reward: 5 },
      { id: 'taps_10000', name: 'Профессионал', desc: 'Сделай 10 000 тапов', type: 'taps', value: 10000, reward: 10 },
      { id: 'taps_50000', name: 'Мастер тапа', desc: 'Сделай 50 000 тапов', type: 'taps', value: 50000, reward: 15 },
      { id: 'taps_200000', name: 'Легенда тапа', desc: 'Сделай 200 000 тапов', type: 'taps', value: 200000, reward: 25 },
      { id: 'level_5', name: 'Менеджер банка', desc: 'Достигни 5 уровня', type: 'level', value: 5, reward: 8 },
      { id: 'level_10', name: 'Вице-президент', desc: 'Достигни 10 уровня', type: 'level', value: 10, reward: 15 },
      { id: 'level_15', name: 'Генеральный директор', desc: 'Достигни 15 уровня', type: 'level', value: 15, reward: 30 },
      { id: 'coins_50000', name: 'Богатый клиент', desc: 'Заработай 50 000 ₽ всего', type: 'coins', value: 50000, reward: 10 },
      { id: 'coins_500000', name: 'Миллионер', desc: 'Заработай 500 000 ₽ всего', type: 'coins', value: 500000, reward: 20 },
      { id: 'coins_5000000',name: 'Олигарх', desc: 'Заработай 5 000 000 ₽ всего',type: 'coins', value: 5000000,reward: 35 }
    ];
    // ====================== СОХРАНЕНИЕ ПРОГРЕССА ======================
    const CLOUD_KEY = 'bank_tap_progress_v1';
    function saveProgress() {
      const data = JSON.stringify(player);
      tg.CloudStorage.setItem(CLOUD_KEY, data, (err, success) => {
        if (err || !success) {
          localStorage.setItem('bankTapSave', data);
        }
      });
    }
    function loadProgress() {
      tg.CloudStorage.getItem(CLOUD_KEY, (err, value) => {
        if (value) {
          try {
            const saved = JSON.parse(value);
            Object.assign(player, saved);
            player.maxEnergy = 800 + (player.energyMaxLevel || 0) * 50;
            player.energyRecoverTime = Math.max(0.4, 3 - (player.energySpeedLevel || 0) * 0.26);
          } catch (e) {}
        } else {
          const localData = localStorage.getItem('bankTapSave');
          if (localData) Object.assign(player, JSON.parse(localData));
        }
        redraw();
        updateUI();
      });
    }
    setInterval(saveProgress, 30000);
    // ====================== КАРТОЧКА БАНКА ======================
    function drawFrame() {
      frameCtx.clearRect(0, 0, 380, 460);
      frameCtx.strokeStyle = "#00ff9d"; frameCtx.lineWidth = 6; frameCtx.lineJoin = 'round';
      frameCtx.strokeRect(20, 50, 340, 360);
      frameCtx.fillStyle = "#ffffff"; frameCtx.font = "bold 16px 'Press Start 2P'";
      frameCtx.textAlign = "center"; frameCtx.fillText(`LVL ${player.level}`, 190, 85);
    }
    function drawContent() {
      contentCtx.clearRect(0, 0, 380, 460);
      const bank = banks[player.level - 1] || {name: "BANK TAP", color: "#00ff9d"};
      contentCtx.shadowBlur = 15; contentCtx.shadowColor = bank.color;
      contentCtx.fillStyle = bank.color; contentCtx.fillRect(50, 130, 280, 160);
      contentCtx.shadowBlur = 0;
      contentCtx.fillStyle = "rgba(255,255,255,0.3)"; contentCtx.fillRect(58, 138, 264, 35);
      contentCtx.fillStyle = "#ffd700"; contentCtx.fillRect(75, 160, 65, 45);
      contentCtx.fillStyle = "#ffffff"; contentCtx.font = "bold 22px 'Press Start 2P'";
      contentCtx.textAlign = "center"; contentCtx.shadowBlur = 10; contentCtx.shadowColor = "#000000";
      contentCtx.fillText(bank.name, 190, 215);
      contentCtx.shadowBlur = 0; contentCtx.font = "14px monospace"; contentCtx.fillStyle = "#ffffff";
      contentCtx.fillText("•••• •••• •••• " + (1000 + player.level*111), 190, 250);
      contentCtx.fillStyle = "#00ff9d"; contentCtx.font = "bold 12px 'Press Start 2P'";
      contentCtx.fillText("МИР", 260, 280);
    }
    function redraw() { drawFrame(); drawContent(); }
    function updateUI() {
      document.getElementById('coins').textContent = Math.floor(player.coins).toLocaleString('ru-RU');
      document.getElementById('energy').textContent = Math.floor(player.energy);
      document.getElementById('maxEnergy').textContent = player.maxEnergy;
      document.getElementById('level').textContent = player.level;
      const passive = player.achievementPassiveBonus + (player.p2pLevel * 0.8) + player.referralIncome + (player.blackMarketPassive || 0);
      document.getElementById('profit').textContent = Math.floor(passive).toLocaleString('ru-RU');
      document.getElementById('dropCards').textContent = player.dropCards;
      document.getElementById('perTap').textContent = `+${Math.floor(1 + player.manualLevel * 1.15)} ₽`;
      document.getElementById('energySpeed').textContent = player.energyRecoverTime.toFixed(1);
      const needed = getClicksNeeded();
      const percent = needed === Infinity ? 100 : Math.min(100, Math.floor((player.accumulatedClicks / needed) * 100));
      document.getElementById('clicksCurrent').textContent = player.accumulatedClicks.toLocaleString('ru-RU');
      document.getElementById('clicksNeeded').textContent = needed === Infinity ? 'MAX' : needed.toLocaleString('ru-RU');
      document.getElementById('levelProgressFill').style.width = percent + '%';
      redraw();
    }
    function getClicksNeeded() {
      if (player.level >= 15) return Infinity;
      const base = 180;
      return Math.ceil(base * Math.pow(2.85, player.level - 1));
    }
    function tap(e) {
      e.preventDefault(); e.stopPropagation();
      if (player.energy <= 0) return;
      if (Date.now() - lastTapTime < 60) return;
      lastTapTime = Date.now();
      playSound('tap');
      player.energy = Math.max(0, player.energy - 1);
      const earn = Math.floor(1 + player.manualLevel * 1.15);
      player.coins += earn;
      player.totalCoinsEarned += earn;
      player.accumulatedClicks++;
      player.totalTaps++;
      contentCanvas.style.transform = 'scale(1.06) translateY(-6px)';
      setTimeout(() => contentCanvas.style.transform = 'scale(1) translateY(0)', 110);
      const rect = wrapper.getBoundingClientRect();
      let cx = e.clientX ?? (e.touches?.[0]?.clientX ?? rect.left + rect.width/2);
      let cy = e.clientY ?? (e.touches?.[0]?.clientY ?? rect.top + rect.height/2);
      const ox = cx - rect.left + Math.random()*40 - 20;
      const oy = cy - rect.top - 30;
      createFloatingText(earn, rect.left + ox, rect.top + oy);
      checkLevelUp();
      checkAllAchievements();
      updateUI();
      saveProgress();
    }
    function createFloatingText(amount, x, y) {
      const el = document.createElement('div');
      el.className = 'float-text'; el.textContent = `+${amount}`;
      el.style.left = `${x}px`; el.style.top = `${y}px`;
      document.body.appendChild(el); setTimeout(() => el.remove(), 1200);
    }
    function showTopNotification(message, type = 'level') {
      const notif = document.getElementById('level-up-notification');
      notif.textContent = message;
      if (type === 'level') {
        notif.style.background = 'rgba(0, 255, 157, 0.92)';
        notif.style.color = '#000';
      } else {
        notif.style.background = 'rgba(255, 215, 0, 0.92)';
        notif.style.color = '#000';
      }
      notif.classList.add('show');
      setTimeout(() => notif.classList.remove('show'), 4000);
    }
    function checkLevelUp() {
      let needed = getClicksNeeded();
      let oldLevel = player.level;
      while (player.accumulatedClicks >= needed && player.level < 15) {
        player.accumulatedClicks -= needed;
        player.level++;
        needed = getClicksNeeded();
      }
      if (player.level > oldLevel) {
        playSound('level');
        showTopNotification(`LEVEL UP! Теперь уровень ${player.level} 🔥`, 'level');
        checkAllAchievements();
        saveProgress();
        updateUI();
      }
    }
    function checkAllAchievements() {
      let newlyUnlocked = [];
      achievements.forEach(ach => {
        if (player.unlockedAchievements.includes(ach.id)) return;
        let unlocked = false;
        if (ach.type === 'taps' && player.totalTaps >= ach.value) unlocked = true;
        if (ach.type === 'level' && player.level >= ach.value) unlocked = true;
        if (ach.type === 'coins' && player.totalCoinsEarned >= ach.value) unlocked = true;
        if (unlocked) {
          player.unlockedAchievements.push(ach.id);
          player.achievementPassiveBonus += ach.reward;
          newlyUnlocked.push(ach);
        }
      });
      if (newlyUnlocked.length > 0) {
        playSound('achivka');
        saveProgress();
        updateUI();
        const total = newlyUnlocked.reduce((sum, a) => sum + a.reward, 0);
        const names = newlyUnlocked.map(a => a.name).join(', ');
        showTopNotification(`Достижение: ${names}!\n+${total} ₽/ч к пассивному доходу`, 'achievement');
      }
    }
    function showAchievements() {
      playSound('interface');
      let body = '<h2 style="color:#00ff9d;text-align:center;margin-bottom:20px;">ДОСТИЖЕНИЯ 🏆</h2>';
      achievements.forEach(ach => {
        const isUnlocked = player.unlockedAchievements.includes(ach.id);
        let progress = 0;
        let currentValue = 0;
        let targetValue = ach.value;
        let progressText = '';
        if (ach.type === 'taps') {
          currentValue = player.totalTaps;
          progress = Math.min(100, Math.floor((currentValue / targetValue) * 100));
          progressText = `${currentValue.toLocaleString('ru-RU')} / ${targetValue.toLocaleString('ru-RU')} тапов`;
        } else if (ach.type === 'level') {
          currentValue = player.level;
          progress = Math.min(100, Math.floor((currentValue / targetValue) * 100));
          progressText = `Уровень ${currentValue} / ${targetValue}`;
        } else if (ach.type === 'coins') {
          currentValue = player.totalCoinsEarned;
          progress = Math.min(100, Math.floor((currentValue / targetValue) * 100));
          progressText = `${Math.floor(currentValue).toLocaleString('ru-RU')} / ${targetValue.toLocaleString('ru-RU')} ₽`;
        }
        const barColor = isUnlocked ? '#00ff9d' : (progress >= 100 ? '#ffd700' : '#555');
        const barBg = isUnlocked ? 'rgba(0,255,157,0.3)' : '#0f1a0f';
        body += `
          <div style="border:2px solid ${isUnlocked ? '#00ff9d' : '#444'};
                      background: ${isUnlocked ? 'rgba(0,255,157,0.12)' : '#001a33'};
                      padding:14px 12px; margin:12px 0; border-radius:10px;
                      opacity: ${isUnlocked ? '1' : '0.85'};">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
              <span style="font-weight:bold; font-size:14px; color:${isUnlocked ? '#00ff9d' : '#f0fff0'}">
                ${ach.name}
              </span>
              <span style="font-size:12px; color:${isUnlocked ? '#00ff9d' : '#aaa'}">
                ${isUnlocked ? '✅ Получено' : `+${ach.reward} ₽/ч`}
              </span>
            </div>
            <div style="font-size:11px; color:#aaa; margin-bottom:6px;">
              ${ach.desc}
            </div>
            ${!isUnlocked ? `
              <div style="margin-top:10px;">
                <div style="height:8px; background:${barBg}; border-radius:4px; overflow:hidden; border:1px solid #333;">
                  <div style="height:100%; width:${progress}%; background:${barColor}; transition:width 0.4s ease;"></div>
                </div>
                <div style="text-align:center; font-size:10px; color:#aaa; margin-top:4px;">
                  ${progressText} — ${progress}%
                </div>
              </div>
            ` : `
              <div style="text-align:center; font-size:11px; color:#00ff9d; margin-top:8px; font-weight:bold;">
                100% — выполнено!
              </div>
            `}
          </div>`;
      });
      const footer = '<button onclick="closeModal()" style="width:100%; padding:14px; background:#001a33; border:2px solid #00ff9d; color:#f0f8ff; border-radius:8px; margin-top:12px; font-size:13px;">ЗАКРЫТЬ</button>';
      document.getElementById('modalHeader').innerHTML = '';
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modalFooter').innerHTML = footer;
      document.getElementById('modal').style.display = 'flex';
      redraw();
    }
    function showMenu(type) {
      playSound('interface');
      if (type === 'shop') return showShop();
      if (type === 'market') return showBlackMarket();
      if (type === 'daily') return showDailyBonus();
      if (type === 'refs') return showReferrals();
      if (type === 'tasks') return showTasks();
      let header = `<h2 style="color:#00ff9d;margin:0;">${type.toUpperCase()}</h2>`;
      let body = '<p style="margin:40px 0;text-align:center;color:#aaa;">Раздел в разработке</p>';
      let footer = '<button onclick="closeModal()" style="width:100%;padding:14px;background:#001a33;border:2px solid #00ff9d;color:#f0f8ff;">ЗАКРЫТЬ</button>';
      document.getElementById('modalHeader').innerHTML = header;
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modalFooter').innerHTML = footer;
      document.getElementById('modal').style.display = 'flex';
      redraw();
    }
    function closeModal() {
      document.getElementById('modal').style.display = 'none';
      tg.expand();
      redraw();
      updateUI();
      saveProgress();
    }
    // ====================== МАГАЗИН ======================
    function showShop() {
      playSound('interface');
      updateUI();
      let body = '';
      shopItems.forEach(item => {
        const lvl = player[`${item.id}Level`] || 0;
        const max = item.maxLvl;
        const curr = typeof item.effect === 'function' ? item.effect(lvl) : '—';
        const next = lvl < max ? item.effect(lvl + 1) : null;
        const cost = lvl >= max ? 0 : Math.floor(item.basePrice * Math.pow(item.priceMult, lvl));
        const canBuy = lvl < max && player.coins >= cost;
        let effectText = item.desc;
        if (item.id === 'manual') effectText += `: сейчас +${curr} ₽ за тап`;
        if (item.id === 'energyMax') effectText += `: сейчас ${curr} макс. энергии`;
        if (item.id === 'energySpeed') effectText += `: сейчас 1 ед. за ${curr} сек`;
        if (item.id === 'autoTap') effectText += `: ${curr}`;
        if (item.id === 'p2p') effectText += `: сейчас +${curr} ₽/ч`;
        body += `
          <div style="border:2px solid ${lvl>=max?'#00ff9d':'#444'};background:${lvl>=max?'rgba(0,255,157,0.15)':'#001a33'};padding:12px;margin:10px 0;border-radius:8px;">
            <div style="display:flex;justify-content:space-between;font-weight:bold;">
              <span>${item.name}</span>
              <span>${lvl}/${max}</span>
            </div>
            <div style="font-size:11px;color:#aaa;margin:6px 0;">${effectText}</div>
            <div style="display:flex;justify-content:space-between;font-size:11px;">
              <span>Сейчас:</span><span style="color:#00ff9d;">${curr}</span>
            </div>
            ${next!==null?`<div style="display:flex;justify-content:space-between;font-size:11px;color:#ffd700;">
              <span>Далее:</span><span>${next}</span>
            </div>`:''}
            ${lvl < max ?
              `<button onclick="buyItem('${item.id}')" ${!canBuy?'disabled':''} style="margin-top:8px;width:100%;padding:12px;background:${canBuy?'#00ff9d':'#444'};color:${canBuy?'#000':'#666'};border:none;border-radius:6px;font-size:13px;">
                ${canBuy ? `КУПИТЬ ЗА ${cost.toLocaleString()} ₽` : `НЕДОСТАТОЧНО (${cost.toLocaleString()} ₽)`}
              </button>` :
              `<div style="margin-top:8px;padding:12px;background:#001a33;color:#666;text-align:center;border-radius:6px;font-size:12px;">МАКСИМУМ</div>`}
          </div>`;
      });
      document.getElementById('modalHeader').innerHTML = '<h2 style="color:#00ff9d;margin:0;">МАГАЗИН 🛒</h2>';
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modalFooter').innerHTML = '<button onclick="closeModal()" style="width:100%;padding:14px;background:#001a33;border:2px solid #00ff9d;color:#f0f8ff;">ЗАКРЫТЬ</button>';
      document.getElementById('modal').style.display = 'flex';
      redraw();
    }
    function buyItem(id) {
      const item = shopItems.find(i => i.id === id);
      if (!item) return;
      const lvlKey = `${item.id}Level`;
      let lvl = player[lvlKey] || 0;
      if (lvl >= item.maxLvl) return;
      const cost = Math.floor(item.basePrice * Math.pow(item.priceMult, lvl));
      if (player.coins < cost) {
        tg.showAlert(`Недостаточно средств!\nНужно: ${cost.toLocaleString()} ₽`);
        return;
      }
      player.coins -= cost;
      player.totalCoinsEarned += cost;
      player[lvlKey] = lvl + 1;
      if (id === 'energyMax') player.maxEnergy = 800 + player[lvlKey] * 50;
      if (id === 'energySpeed') player.energyRecoverTime = Math.max(0.4, 3 - player[lvlKey] * 0.26);
      if (id === 'p2p') player.p2pLevel = player[lvlKey];
      if (id === 'autoTap') player.autoTapPurchased = true;
      saveProgress();
      updateUI();
      closeModal();
      setTimeout(() => showShop(), 70);
    }
    // ====================== ЧЁРНЫЙ РЫНОК ======================
    function showBlackMarket() {
      playSound('interface');
      updateUI();
      let body = '<p style="text-align:center;color:#ff5555;font-size:11px;margin-bottom:16px;">Внимание: цены завышены, рискуете!</p>';
      blackMarketItems.forEach(item => {
        const lvl = player[`bm_${item.id}`] || 0;
        const max = item.maxLvl;
        const cost = lvl >= max ? 0 : Math.floor(item.basePrice * Math.pow(item.priceMult, lvl));
        const canBuy = lvl < max && player.coins >= cost;
        const currentPassive = lvl * item.passivePerLevel;
        body += `
          <div style="border:2px solid #ff4444;background:#1a0000;padding:12px;margin:10px 0;border-radius:8px;opacity:0.92;">
            <div style="display:flex;justify-content:space-between;align-items:center;font-weight:bold;color:#ffdd88;">
              <span>${item.name}</span>
            </div>
            <div style="font-size:11px;color:#aaa;margin:6px 0;">${item.desc}</div>
            <div style="font-size:11px;color:#00ff9d;margin:6px 0 4px;">Пассивный доход: +${currentPassive} ₽/ч</div>
            <div style="display:flex;justify-content:space-between;font-size:11px;">
              <span>Уровень:</span><span>${lvl}/${max}</span>
            </div>
            ${lvl < max ? `
              <div style="display:flex;justify-content:space-between;font-size:11px;color:#ffd700;">
                <span>След. уровень:</span><span>${cost.toLocaleString()} ₽</span>
              </div>
              <button onclick="buyBlackMarketItem('${item.id}')" ${!canBuy?'disabled':''} style="margin-top:10px;width:100%;padding:12px;background:${canBuy?'#ff4444':'#444'};color:${canBuy?'#000':'#666'};border:none;border-radius:6px;font-weight:bold;">
                ${canBuy ? `КУПИТЬ ЗА ${cost.toLocaleString()} ₽` : `НЕДОСТАТОЧНО (${cost.toLocaleString()} ₽)`}
              </button>
            ` : `
              <div style="margin-top:10px;padding:12px;background:#330000;color:#666;text-align:center;border-radius:6px;font-weight:bold;">
                МАКСИМУМ (5 ур.)
              </div>
            `}
          </div>`;
      });
      document.getElementById('modalHeader').innerHTML = '<h2 style="color:#ff5555;margin:0;">ЧЁРНЫЙ РЫНОК ⚠️</h2>';
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modalFooter').innerHTML = '<button onclick="closeModal()" style="width:100%;padding:14px;background:#001a33;border:2px solid #ff4444;color:#f0f8ff;">ЗАКРЫТЬ</button>';
      document.getElementById('modal').style.display = 'flex';
      redraw();
    }
    function buyBlackMarketItem(id) {
      const item = blackMarketItems.find(i => i.id === id);
      if (!item) return;
      const lvlKey = `bm_${id}`;
      let lvl = player[lvlKey] || 0;
      if (lvl >= item.maxLvl) return;
      const cost = Math.floor(item.basePrice * Math.pow(item.priceMult, lvl));
      if (player.coins < cost) {
        tg.showAlert(`Недостаточно средств!\nНужно: ${cost.toLocaleString()} ₽`);
        return;
      }
      player.coins -= cost;
      player.totalCoinsEarned += cost;
      player[lvlKey] = lvl + 1;
      player.blackMarketPassive = (player.blackMarketPassive || 0) + item.passivePerLevel;
      saveProgress();
      updateUI();
      closeModal();
      setTimeout(() => showBlackMarket(), 70);
    }
    // ====================== БОНУС (ИСПРАВЛЕНО — ТЕПЕРЬ ОТКРЫВАЕТСЯ) ======================
    function showDailyBonus() {
      playSound('interface');
      updateUI();

      const today = new Date().toISOString().split('T')[0];
      let streak = Math.max(1, player.streak || 1);
      let canClaim = true;

      if (player.lastBonusClaimed === today) {
        canClaim = false;
      } else {
        const yesterdayStr = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        if (player.lastBonusClaimed === yesterdayStr) {
          streak = streak + 1;
        } else {
          streak = 1;
        }
      }

      const currentBonus = getDailyBonus(streak);

      let body = `
        <h2 style="color:#00ff9d;text-align:center;margin-bottom:20px;">ЕЖЕДНЕВНЫЙ БОНУС</h2>
        <div style="text-align:center;">
          <div style="font-size:18px;color:#f0f8ff;">Стрик: <b>${streak} день</b></div>
          ${canClaim ? 
            `<div style="font-size:26px;color:#ffd700;margin:20px 0;">+${currentBonus.toLocaleString('ru-RU')} ₽</div>` : 
            `<div style="font-size:16px;color:#aaa;margin:20px 0;">Сегодня уже получено<br>Завтра: +${getDailyBonus(streak+1).toLocaleString('ru-RU')} ₽</div>`}
        </div>
        <div style="background:rgba(0,255,157,0.1);border:1px solid #00ff9d;padding:12px;border-radius:8px;margin:20px 0;">
          <div style="font-size:12px;margin-bottom:8px;">Прогресс 7-дневки:</div>
          <div style="height:10px;background:#001a33;border-radius:5px;overflow:hidden;">
            <div style="height:100%;width:${Math.min(100, streak/7*100)}%;background:#00ff9d;"></div>
          </div>
        </div>
      `;

      document.getElementById('modalHeader').innerHTML = '';
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modalFooter').innerHTML = canClaim ?
        `<button onclick="claimDailyBonus(${streak})" style="width:100%;padding:16px;font-size:16px;background:#00ff9d;color:#000;border:none;border-radius:8px;">ПОЛУЧИТЬ ${currentBonus.toLocaleString('ru-RU')} ₽</button>
         <button onclick="closeModal()" style="width:100%;padding:12px;margin-top:10px;background:#001a33;border:1px solid #00ff9d;color:#f0f8ff;">ЗАКРЫТЬ</button>` :
        `<button onclick="closeModal()" style="width:100%;padding:16px;background:#001a33;border:1px solid #00ff9d;color:#f0f8ff;">ЗАКРЫТЬ</button>`;

      document.getElementById('modal').style.display = 'flex';
      redraw();
    }

    function claimDailyBonus(streak) {
      const today = new Date().toISOString().split('T')[0];
      const bonus = getDailyBonus(streak);

      player.coins += bonus;
      player.totalCoinsEarned += bonus;
      player.lastBonusClaimed = today;
      player.streak = streak;

      saveProgress();
      updateUI();
      checkAllAchievements();

      const toast = document.getElementById('achievement-toast');
      toast.innerHTML = `+${bonus.toLocaleString('ru-RU')} ₽<br>Ежедневный бонус!<br>Стрик: ${streak}`;
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 4000);

      // Обновляем вкладку сразу (без закрытия — теперь всегда работает)
      showDailyBonus();
    }

    function getDailyBonus(streak) {
      const bonuses = [500, 800, 1200, 1800, 2500, 3500, 5000];
      return bonuses[Math.min(streak - 1, bonuses.length - 1)] || 500;
    }
    // ====================== РЕФЕРАЛЫ ======================
    function showReferrals() {
      playSound('interface');
      updateUI();
      if (!player.referralCode && tg.initDataUnsafe?.user?.id) {
        player.referralCode = tg.initDataUnsafe.user.id.toString();
        saveProgress();
      }
      const botUsername = 'BANKTAP_BOT';
      const miniAppName = 'banktaps';
      const refLink = `https://t.me/${botUsername}/${miniAppName}?start=${player.referralCode || 'no_id'}`;
      let body = `
        <h2 style="color:#00ff9d;text-align:center;margin-bottom:20px;">ТИМЛИД / РЕФЕРАЛЫ</h2>
        <div style="background:rgba(0,255,157,0.1);border:1px solid #00ff9d;padding:15px;border-radius:8px;margin:15px 0;">
          <div style="font-size:13px;margin-bottom:10px;">Твоя реф. ссылка:</div>
          <div style="word-break:break-all;font-size:12px;background:#001a33;padding:10px;border-radius:6px;color:#f0f8ff;">
            ${refLink}
          </div>
          <button onclick="navigator.clipboard.writeText('${refLink}').then(()=>tg.showAlert('Ссылка скопирована!')).catch(()=>tg.showAlert('Не удалось скопировать'))" style="margin-top:10px;width:100%;padding:10px;background:#00ff9d;color:#000;border:none;border-radius:6px;">
            СКОПИРОВАТЬ ССЫЛКУ
          </button>
        </div>
        <div style="text-align:center;margin:20px 0;">
          <div style="font-size:18px;color:#f0f8ff;">Приглашено: <b>${player.referrals} чел.</b></div>
          <div style="font-size:16px;color:#ffd700;margin-top:10px;">Доход от рефералов: <b>+${player.referralIncome.toFixed(2)} ₽/ч</b></div>
        </div>
        <div style="font-size:12px;color:#aaa;text-align:center;margin-top:20px;">
          0.5% от заработка каждого реферала — твой пассивный доход навсегда
        </div>
      `;
      document.getElementById('modalHeader').innerHTML = '';
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modalFooter').innerHTML = '<button onclick="closeModal()" style="width:100%;padding:14px;background:#001a33;border:2px solid #00ff9d;color:#f0f8ff;">ЗАКРЫТЬ</button>';
      document.getElementById('modal').style.display = 'flex';
      redraw();
    }
    // ====================== ЗАДАНИЯ ======================
    function showTasks() {
      playSound('interface');
      updateUI();
      const channelLink = "https://t.me/+RZ2c18IOJrA1YzQy";
      const bonusAmount = 500;
      const alreadyPending = player.subscriptionBonusPending;
      let body = `
        <h2 style="color:#00ff9d;text-align:center;margin-bottom:20px;">ЗАДАНИЯ</h2>
        <div style="background:rgba(0,255,157,0.1);border:1px solid #00ff9d;padding:16px;border-radius:10px;margin-bottom:20px;">
          <div style="font-size:15px;font-weight:bold;color:#ffd700;margin-bottom:12px;">Подписка на канал</div>
          <div style="font-size:13px;color:#f0fff0;margin-bottom:12px;">
            Подпишитесь на канал и получите <b>+${bonusAmount} ₽</b><br>
            <small style="color:#aaa;">Начисление через 24 часа после проверки</small>
          </div>
          ${alreadyPending ?
            `<div style="text-align:center;color:#ffdd00;font-size:14px;margin:16px 0;">
              Запрос отправлен!<br>Бонус будет начислен через ~24 часа (если подписка активна)
            </div>` :
            `<button onclick="claimSubscriptionBonus()" style="width:100%;padding:16px;background:#00ff9d;color:#000;border:none;border-radius:8px;font-size:16px;font-weight:bold;">
              ПОЛУЧИТЬ БОНУС
            </button>`
          }
        </div>
        <p style="text-align:center;color:#aaa;font-size:11px;">Другие задания — скоро</p>
      `;
      document.getElementById('modalHeader').innerHTML = '<h2 style="color:#00ff9d;margin:0;">ЗАДАНИЯ 📋</h2>';
      document.getElementById('modalBody').innerHTML = body;
      document.getElementById('modalFooter').innerHTML = '<button onclick="closeModal()" style="width:100%;padding:14px;background:#001a33;border:2px solid #00ff9d;color:#f0f8ff;">ЗАКРЫТЬ</button>';
      document.getElementById('modal').style.display = 'flex';
      redraw();
    }
    function claimSubscriptionBonus() {
      if (player.subscriptionBonusPending) {
        tg.showAlert("Запрос уже отправлен! Бонус придёт через ~24 часа.");
        return;
      }
      const channelLink = "https://t.me/+RZ2c18IOJrA1YzQy";
      tg.showAlert("Открываем канал...\n\nПодпишитесь и не отписывайтесь!\nЧерез 24 часа бонус 500 ₽ будет начислен автоматически.");
      tg.openLink(channelLink);
      player.subscriptionBonusPending = true;
      saveProgress();
      showTasks();
    }
    // ====================== ЭНЕРГИЯ ======================
    setInterval(() => {
      const now = Date.now();
      const timePassed = now - lastEnergyTime;
      const recoverInterval = player.energyRecoverTime * 1000;
      if (timePassed >= recoverInterval && player.energy < player.maxEnergy) {
        player.energy = Math.min(player.maxEnergy, player.energy + 1);
        lastEnergyTime = now;
        updateUI();
        saveProgress();
      }
    }, 500);
    // ====================== ЗАПУСК ======================
    window.addEventListener('load', () => {
      redraw();
      updateUI();
      loadProgress();
    });
    wrapper.addEventListener('pointerdown', tap, { passive: false });
    wrapper.addEventListener('touchstart', tap, { passive: false });
  </script>
</body>
</html>
